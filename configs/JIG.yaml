# basic setting
bs_train : 2
bs_test : 2
workers : 4
step_per_update: 2
max_epoch : 200

# model setting
pretrained_i3d_weight : './models/model_rgb.pth'
RT_depth : 5
score_range : 30
voter_number : 10
cls : 'Knot_Tying'
# 'Knot_Tying''Needle_Passing''Suturing'

# dataset setting
frames_dir : '/path/to/JIGSAWS/frames'
info_dir : '/path/to/JIGSAWS/info'
experimental_setup_dir : '/path/to/JIGSAWS/Experimental_setup/'
label_max : 30
label_min : 6
judge_max : 5
judge_min : 1
num_frames : 140
seed : 0
temporal_shift_min : -3
temporal_shift_max : 3
num_duration_groups : 4
fold : 0



data_augmentation:
  enabled: true
  crop_scale_min: 0.7
  crop_scale_max: 1.0
  flip_prob: 0.5
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
  rotation_degrees: 10


# optimizer setting
optimizer: 'Adam'
weight_decay : 0.01
base_lr : 0.0001
lr_factor : 0.1

# others
print_freq : 40
